export default "<!--The content below is only a placeholder and can be replaced.-->\n<header>\n  <div *ngIf=\"isWeb\" class=\"cover\" [style.left]=\"xPos\" [style.top]=\"yPos\" ></div>\n  <ul id=Header>\n    <li><a routerLink=\"\" routerLinkActive=\"active\" [routerLinkActiveOptions]=\"{ exact: true }\">Home</a></li>\n    <li><a routerLink=\"/projects\" routerLinkActive=\"active\">Side projects</a></li>\n    <li><a routerLink=\"/about\" routerLinkActive=\"active\" [routerLinkActiveOptions]=\"{ exact: true }\">About</a></li>\n  </ul>\n  <h1 *ngIf=\"!nav.visible && isType\"><strong>Typing test</strong></h1>\n</header>\n<router-outlet></router-outlet>\n<footer *ngIf=\"!nav.visible\">\n  <h2>Let's Keep in Touch!!</h2>\n  <div>\n    <p><a href=\"mailto:lok.chow@mail.utoronto.ca\">lok.chow@mail.utoronto.ca</a></p>\n    <a href=\"https://www.linkedin.com/in/lok-man-christopher-chow/\" target=\"_blank\">LinkedIn</a>\n  </div>\n\n  <p>Copyright 2018 by Christopher Chow</p>\n</footer>\n"
